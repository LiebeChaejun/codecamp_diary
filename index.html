<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS&JS 파이널 프로젝트</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/reset-css@4.0.1/reset.min.css"
    />
    <link rel="stylesheet" href="./assets/style/index.css" />
  </head>
  <body>
    <div class="container">
      <!-- header 섹션 -->
      <header>
        <h1>민지의 다이어리</h1>
        <div class="header_dark_mode">
          <p>다크모드</p>
          <input type="checkbox" />
        </div>
      </header>
      <!-- 배너 -->
      <section class="banner">
        <img src="./assets/images/sample_img.jpg" alt="배너 이미지" />
      </section>
      <!-- 메인 콘텐츠 -->
      <main>
        <nav>
          <ul class="nav_bar">
            <li>일기보관함</li>
            <li>사진보관함</li>
          </ul>
        </nav>
        <!-- 컨텐츠 영역 -->
        <section class="content">
          <div class="album_board">
            <select name="" id="">
              <option value="기본">기본</option>
              <option value="가로형">가로형</option>
              <option value="세로형">세로형</option>
            </select>
          </div>
          <div class="album">
            <img src="./assets/images/parrots/parrot1.jpeg" alt="" />
            <img src="./assets/images/parrots/parrot2.jpeg" alt="" />
            <img src="./assets/images/parrots/parrot3.jpeg" alt="" />
            <img src="./assets/images/parrots/parrot4.jpeg" alt="" />
            <img src="./assets/images/parrots/parrot5.jpeg" alt="" />
            <img src="./assets/images/parrots/parrot6.jpeg" alt="" />
            <img src="./assets/images/parrots/parrot7.jpeg" alt="" />
            <img src="./assets/images/parrots/parrot8.jpeg" alt="" />
          </div>
        </section>
      </main>
    </div>
    <!-- 푸터  -->
    <footer>
      <ul>
        <li>
          <h3>민지의 다이어리</h3>
        </li>
        <li>대표: {name}</li>
        <li>CopyrightC{name}Co.Ltd</li>
      </ul>
    </footer>
  </body>
</html>
