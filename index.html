<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>diary</title>
    <link rel="stylesheet" href="./assets/css/reset.css" />
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>
  <body>
    <div class="container">
      <!-- 헤더 -->
      <header>
        <h2>민지의 다이어리</h2>
        <div>
          <p>다크모드</p>
          <input type="checkbox" class="checkbox_darkmode" />
        </div>
      </header>
      <!-- 배너 -->
      <article class="banner">
        <img src="./assets/image/sample_img.jpg" alt="" />
      </article>
      <!-- 메인 콘텐츠 -->
      <main class="content_box">
        <ul class="nav_bar">
          <li>
            <button>일기보관함</button>
          </li>
          <li>
            <button>사진보관함</button>
          </li>
        </ul>
        <section class="nav_bar__diary">
          <div class="box_search">
            <select class="category" name="category" id="">
              <option value="기쁨">기쁨</option>
            </select>
            <input
              class="search_bar"
              type="text"
              placeholder="검색어를 입력해 주세요"
            />
          </div>
          <button class="button_upload">일기쓰기</button>
        </section>
        <section class="content">
          <!-- 일기 컨텐츠 목록 -->
          <p>등록된 일기가 없습니다.</p>
          <!-- 일기 페이지네이션  -->
          <section class="pagination">
            <button>1</button>
          </section>
        </section>
      </main>
    </div>
    <!-- 푸터 -->
    <footer>
      <div class="footer_info">
        <h3>민지의 다이어리</h3>
        <p>대표: {name}</p>
        <p>CopyC2024.{name}Co.,Ltd</p>
      </div>
    </footer>
  </body>
</html>
