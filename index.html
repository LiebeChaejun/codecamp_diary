<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS&JS 파이널 프로젝트</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/reset-css@4.0.1/reset.min.css"
    />
    <link rel="stylesheet" href="./assets/style/index.css" />
  </head>
  <body>
    <div class="container">
      <!-- header 섹션 -->
      <header style="background-color: lightcoral">
        <h1>민지의 다이어리</h1>
        다크모드<input type="radio" />
      </header>
      <!-- 배너 -->
      <section class="banner" style="background-color: lightblue">
        이곳은 배너 영역입니다.
      </section>
      <!-- 메인 콘텐츠 -->
      <main>
        <nav>
          <ul>
            <li>일기보관함</li>
            <li>사진보관함</li>
          </ul>
        </nav>
        <section>이곳은 메인 콘텐츠 영역입니다.</section>
      </main>
      <!-- 푸터  -->
      <footer>
        <ul>
          이곳은 푸터 영역입니다.
          <li>민지의 다이어리</li>
          <li>대표: {name}</li>
          <li>CopyrightC{name}Co.Ltd</li>
        </ul>
      </footer>
    </div>
  </body>
</html>
