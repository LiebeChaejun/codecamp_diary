<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS&JS 파이널 프로젝트</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/reset-css@4.0.1/reset.min.css"
    />
    <link rel="stylesheet" href="./assets/style/index.css" />
  </head>
  <body>
    <div class="container">
      <!-- header 섹션 -->
      <header>
        <h1>민지의 다이어리</h1>
        <div class="header_dark_mode">
          <p>다크모드</p>
          <input type="checkbox" />
        </div>
      </header>
      <!-- 배너 -->
      <section class="banner">
        <img src="./assets/images/sample_img.jpg" alt="배너 이미지" />
      </section>
      <!-- 메인 콘텐츠 -->
      <main>
        <nav>
          <ul class="nav_bar">
            <li>일기보관함</li>
            <li>사진보관함</li>
          </ul>
        </nav>
        <!-- 컨텐츠 영역 -->
        <section class="content">
          <article class="diary_board">
            <div class="diary_search">
              <div class="diary_search_emoji">
                <select name="" id="">
                  <option value="전체">전체</option>
                  <option value="행복해요">행복해요</option>
                  <option value="슬퍼요">슬퍼요</option>
                  <option value="놀랐어요">놀랐어요</option>
                  <option value="화나요">화나요</option>
                </select>
              </div>
              <input type="text" placeholder="검색어를 입력해주세요." />
            </div>

            <div class="diary_post">
              <button>+ 일기쓰기</button>
            </div>
          </article>

          <div class="content_diaries">
            <p>등록된 일기가 없습니다.</p>
          </div>

          <div class="content_diaries_pagination">
            <button>1</button>
          </div>
        </section>
      </main>
    </div>
    <!-- 푸터  -->
    <footer>
      <ul>
        <li>
          <h3>민지의 다이어리</h3>
        </li>
        <li>대표: {name}</li>
        <li>CopyrightC{name}Co.Ltd</li>
      </ul>
    </footer>
  </body>
</html>
